<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedicalZK - Cold Chain Verification</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50:  '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Smooth fade-in for page transitions */
      .page-enter { animation: fadeIn 0.25s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

      /* Status badge colours */
      .badge-verified { @apply bg-green-100 text-green-800 border border-green-200; }
      .badge-pending  { @apply bg-yellow-100 text-yellow-800 border border-yellow-200; }
      .badge-failed   { @apply bg-red-100 text-red-800 border border-red-200; }
      .badge-violation{ @apply bg-orange-100 text-orange-800 border border-orange-200; }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
